<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width , initial-scale=1.0">
    <title>syllabus tracker</title>
    <link rel = "stylesheet" href="style.css">
    <link rel = "apple-touch-icon" href = "icon.jpeg">
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
            }
    </script>
</head>
<body>
    <script src="script.js"></script>
    <div class="app-container">
        <div class="top-section">
            <header>
                
                <h1 style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-transform: uppercase;">class 10<br>syllabus tracker</h1>
                <div class="notif-container">
    <button class="icon-btn" id="notif-btn">🔔</button>
    <span id="notif-dot" class="notification-dot" style="display: none;"></span>
                </div>

            </header>
            <div class="overall-progress-container">
                <div class="circular-progress">
                    <div class="inner-circle">
                        <h2>0%</h2>
                        <p style="text-transform: capitalize;">overall completed</p>
                        <p id="overall-marks-text" class="marks-total">0 / 500</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="bottom-section">
            <div class="section-header">
                <h2 style="text-transform: uppercase;">subject card</h2>
            </div>
            <main class="subject-row">
                <div class="subject-card">
                    <div class="icon-box maths-icon">📐</div>
                    <h3 style="text-transform: uppercase;">maths</h3>
                    <div class="progress-info">
                        <span class="marks-badge math-marks">0 / 80</span>
                        <span class="maths-percent">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill maths-fill" style ="width : 0%;"></div>
                    </div>
                    <a href ="maths.html"><button>view details</button></a>
                </div>
                <div class="subject-card">
                    <div class="icon-box science-icon">🔬</div>
                    <h3 style="text-transform: uppercase;">science</h3>
                    <div class="progress-info">
                        <span class="marks-badge sci-marks">0 / 80</span>
                        <span class="sci-percent">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill science-fill" style ="width : 0%;"></div>
                    </div>
                    <a href ="science.html"><button>view details</button></a>
                </div>
                <div class="subject-card">
                    <div class="icon-box sst-icon">🌍</div>
                    <h3 style="text-transform: uppercase;">sst</h3>
                    <div class="progress-info">
                        <span class="marks-badge sst-marks">0 / 80</span>
                        <span class="sst-percent">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill sst-fill" style ="width : 0%;"></div>
                    </div>
                    <a href="sst.html"><button>view details</button></a>
                </div>
                <div class="subject-card">
                    <div class="icon-box english-icon">📗</div>
                    <h3 style="text-transform: uppercase;">english</h3>
                    <div class="progress-info">
                        <span class="marks-badge english-marks">0 / 80</span>
                        <span class="english-percent">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill english-fill" style ="width : 0%;"></div>
                    </div>
                    <a href="english.html"><button>view details</button></a>
                </div>
                <div class="subject-card">
                    <div class="icon-box hindi-icon">📕</div>
                    <h3 style="text-transform: uppercase;">hindi</h3>
                    <div class="progress-info">
                        <span class="marks-badge hindi-marks">0 / 80</span>
                        <span class="hindi-percent">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill hindi-fill" style ="width : 0%;"></div>
                    </div>
                    <a href="hindi.html"><button>view details</button></a>
                </div>
            </main>
        </div>

    </div>
</body>
</html>
